name: Build & Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# Phase 2 (IONOS): diesen Job aktivieren und Secrets IONOS_SFTP_* hinterlegen.
# Build dann mit SITE=https://karneval-in-mendig.de BASE=/ ausführen und per
# SamKirkland/FTP-Deploy-Action@v4 (protocol: ftps) nach IONOS hochladen;
# der Ordner php/ wird dabei nach /api/ deployt (config.php nur auf dem Server!).
